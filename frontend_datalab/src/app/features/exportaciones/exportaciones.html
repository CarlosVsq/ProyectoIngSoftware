<div class="flex min-h-screen bg-gray-50 text-gray-800">
  <main class="flex-1 p-6 max-w-[1200px] mx-auto">
    <header class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-semibold text-primary">Exportaciones</h2>

      <div class="flex items-center gap-4">
        <div class="flex flex-col text-right">
          <span class="text-sm font-medium text-gray-800">{{ usuarioNombre }}</span>
          <span class="text-xs text-gray-500">Investigadora Principal</span>
        </div>
        <button (click)="abrirLogoutPanel()" class="flex items-center gap-1 text-gray-600 hover:text-red-600 transition">
          <span class="material-icons text-base">logout</span>
          <span class="text-sm font-medium">Cerrar Sesión</span>
        </button>
      </div>
    </header>

    <section class="grid grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="text-primary font-semibold mb-4">Exportaciones Recientes</h3>
        <div class="space-y-3">
          <div class="flex items-center justify-between bg-green-50 p-4 rounded-lg">
            <div class="flex items-center gap-2 text-gray-800">
              <span class="material-icons text-green-600 text-lg">download</span>
              <div>
                <p class="font-medium">Datos Clínicos Completos</p>
                <p class="text-xs text-gray-500">25 Oct 2024, 14:30</p>
              </div>
            </div>
            <span class="bg-green-100 text-green-700 text-xs px-3 py-1 rounded-full font-semibold">Completado</span>
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="text-primary font-semibold mb-4">Generar Nueva Exportación</h3>
        <div class="space-y-2">
          <button (click)="descargarExcel()" class="w-full text-left bg-blue-700 text-white px-4 py-3 rounded-lg font-medium flex items-center gap-2">
            <span class="material-icons text-white text-sm">database</span>
            Exportar Datos Completos (Excel)
          </button>
          <button (click)="descargarPdf()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-gray-100 transition flex items-center gap-2">
            <span class="material-icons text-gray-500 text-sm">picture_as_pdf</span>
            Exportar Reporte (PDF)
          </button>
        </div>
      </div>
    </section>

    <section class="bg-white p-6 rounded-xl shadow">
      <h3 class="text-primary font-semibold mb-4">Resumen de Exportes</h3>
      <canvas id="exportChart" class="h-72"></canvas>
    </section>
  </main>
  <app-logout-panel #logoutPanel></app-logout-panel>
  <app-alert-panel></app-alert-panel>
</div>
